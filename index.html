<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueChats Advanced</title>
    <style>
        /* --- ADVANCED DARK THEME CSS --- */
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: #161616;
            --primary: #00b8d4;
            --primary-hover: #008c9e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ff3b30;
            --success: #34c759;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 350px; background-color: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .search-bar { padding: 10px 20px; }
        .search-bar input { width: 100%; padding: 10px; border-radius: 20px; border: none; background-color: var(--bg-main); color: var(--text-main); outline: none; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
        .chat-item:hover { background-color: var(--bg-main); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background-color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h100v100H0z" fill="%230a0a0a"/><path d="M0 0l100 100M100 0L0 100" stroke="%23161616" stroke-width="1"/></svg>'); }
        .chat-header { padding: 15px 20px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header-actions button { background: none; border: none; color: var(--primary); font-size: 1.2rem; cursor: pointer; margin-left: 15px; }
        
        /* Encryption Notice */
        .e2ee-notice { text-align: center; padding: 10px; font-size: 0.8rem; color: #ffd60a; background-color: rgba(255, 214, 10, 0.1); }

        /* Messages */
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { max-width: 65%; padding: 12px 16px; border-radius: 18px; position: relative; word-wrap: break-word; line-height: 1.4; animation: popIn 0.3s ease-out; }
        .msg-sent { background-color: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-received { background-color: var(--bg-panel); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; text-align: right; display: block; }

        /* One-Time View Snap Feature */
        .snap-msg { background-color: var(--danger); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .snap-viewed { background-color: transparent; border: 1px solid var(--danger); color: var(--danger); cursor: default; }

        /* Input Area */
        .input-area { padding: 15px 20px; background-color: var(--bg-panel); display: flex; gap: 10px; align-items: center; }
        .btn-action { background: none; border: none; color: var(--text-sub); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .btn-action:hover { color: var(--primary); }
        .msg-input { flex: 1; padding: 15px 20px; border-radius: 25px; border: none; background-color: var(--bg-main); color: var(--text-main); font-size: 1rem; outline: none; }
        .btn-send { background-color: var(--primary); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-send:hover { background-color: var(--primary-hover); }

        /* Animations */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        /* Video Modal for Snaps */
        #snapModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #cameraFeed { max-width: 90%; max-height: 70vh; border-radius: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>TrueChats</h2>
            <div style="font-size: 1.5rem;">⚙️</div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search or start new chat...">
        </div>
        <div class="chat-list">
            <div class="chat-item">
                <div class="avatar">U1</div>
                <div>
                    <h4 style="margin-bottom: 5px;">User 1</h4>
                    <p style="color: var(--text-sub); font-size: 0.9rem;">Tap to view snap</p>
                </div>
            </div>
            </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar">U1</div>
                <div>
                    <h3>User 1</h3>
                    <p style="color: var(--success); font-size: 0.8rem;">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button title="Voice Call">📞</button>
                <button title="Video Call">📹</button>
                <button title="More Features">⋮</button>
            </div>
        </div>

        <div class="e2ee-notice">
            🔒 Messages and calls are end-to-end encrypted. No one outside of this chat can read or listen to them.
        </div>

        <div class="messages-container" id="chatBox">
            </div>

        <div class="input-area">
            <button class="btn-action" onclick="openCameraSnap()" title="Send 1-Time View Snap">📸</button>
            <button class="btn-action" title="Attach File">📎</button>
            <input type="text" class="msg-input" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button class="btn-send" onclick="sendTextMessage()">➤</button>
        </div>
    </div>

    <div id="snapModal">
        <h2 style="margin-bottom: 20px; color: white;">1-Time View Media</h2>
        <video id="cameraFeed" autoplay playsinline></video>
        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button class="btn-send" style="width: auto; padding: 10px 20px; border-radius: 20px;" onclick="closeSnapModal()">Cancel</button>
            <button class="btn-send" style="width: auto; padding: 10px 20px; border-radius: 20px; background-color: var(--danger);" onclick="simulateSendSnap()">Send Snap</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        let snapStream = null;

        // 1. Spontaneous Messaging Logic
        function sendTextMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // Simulate E2EE Encryption Process (Visual only for single file)
            console.log("Encrypting using AES-256-GCM before processing...");
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Create Sent Message UI
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-bubble msg-sent';
            msgDiv.innerHTML = `${text} <span class="msg-time">${time} ✓✓</span>`;
            chatBox.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
            messageInput.value = '';

            // Simulate auto-reply to show it's working
            setTimeout(() => { receiveMessage("I got your message securely."); }, 1000);
        }

        // Allow sending with Enter key
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendTextMessage();
        });

        function receiveMessage(text) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-bubble msg-received';
            msgDiv.innerHTML = `${text} <span class="msg-time">${time}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 2. One-Time View Photo (Snap) Logic
        async function openCameraSnap() {
            const modal = document.getElementById('snapModal');
            const video = document.getElementById('cameraFeed');
            modal.style.display = 'flex';

            try {
                // Request camera access
                snapStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = snapStream;
            } catch (err) {
                alert("Camera access denied or unavailable. You can still test the UI.");
                console.error(err);
            }
        }

        function closeSnapModal() {
            document.getElementById('snapModal').style.display = 'none';
            if (snapStream) {
                snapStream.getTracks().forEach(track => track.stop()); // Turn off camera light
            }
        }

        function simulateSendSnap() {
            closeSnapModal();
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Create Snap Message UI
            const snapId = 'snap_' + Math.random().toString(36).substr(2, 9);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-bubble msg-sent snap-msg';
            msgDiv.id = snapId;
            msgDiv.innerHTML = `💣 Tap to View Snap <span class="msg-time">${time}</span>`;
            
            // Add click-to-view logic
            msgDiv.onclick = function() {
                alert("Viewing 1-Time Photo...");
                // Transform button after viewing
                this.className = 'msg-bubble msg-sent snap-viewed';
                this.innerHTML = `Opened <span class="msg-time">${time}</span>`;
                this.onclick = null; // Remove click event so it can't be opened again
            };

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Load some initial fake history
        window.onload = () => {
            receiveMessage("Hey! This connection is secure.");
        };
    </script>
</body>
</html>
